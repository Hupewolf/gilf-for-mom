<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Tặng mẹ</title>
</head>
<body>
    <h2>Nhân ngày sinh nhật mẹ và ngày phụ nữ Việt Nam</h2>
    <div class="container">
        <div class="envelope" onclick="openEnvelope(this)">
            
            <div class="flap"></div>
            <div class="inner-envelope"></div>
            <div class="letter">
                <h3>Chúc mẹ</h3>
                <p>Con chúc mẹ sinh nhật nhiều sức khỏe</p>
            </div>
            <img src="img/durian.png" class="icon">
        </div>
        <div class="envelope" onclick="openEnvelope(this)">
            <div class="flap"></div>
            <div class="inner-envelope"></div>
            <div class="letter">
                <h3>Chúc mẹ</h3>
                <p>Con chúc mẹ ngày phụ nữ Việt Nam luôn xinh đẹp</p>
            </div>
            <img src="img/handbag.png" class="icon">
        </div>
        <div class="envelope" onclick="openEnvelope(this)">
            <div class="flap"></div>
            <div class="inner-envelope"></div>
            <div class="letter">
                <h3>Chúc mẹ</h3>
                <p>Con chúc ngày hôm nay, năm này, cả đời này luôn nở nụ cười hạnh phúc</p>
            </div>
            <img src="img/gold-bars.png" class="icon">
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
